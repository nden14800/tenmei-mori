name: Discord Notify on Push

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discordへ更新通知を送る
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const webhook = process.env.DISCORD_WEBHOOK;
            const commit = context.payload.head_commit;
            const message = commit?.message?.split('\n')[0] || '更新されました';

            const body = {
              embeds: [{
                title: '📢 天命乃杜 サイト更新のお知らせ',
                description: '天命乃杜のサイトが更新されました。',
                color: 0xc5a059,
                fields: [
                  {
                    name: '更新内容',
                    value: message,
                    inline: false
                  },
                  {
                    name: '参拝はこちら',
                    value: 'https://tenmei-mori.pages.dev/',
                    inline: false
                  }
                ],
                footer: { text: '天命乃杜' },
                timestamp: new Date().toISOString()
              }]
            };

            await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            });
